services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./src/backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8080:80"  ##80=PHP, 3000=NODE
    volumes:
      - ./src/backend:/app
    depends_on:
      - postgres

  frontend:
    build: ./src/frontend
    restart: unless-stopped
    ports:
      - "3000:5173" ##5173=Vite
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: